<body class="bg-[#0f172a] text-slate-200 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full">
        <header class="text-center mb-12">
            <img src="/images/logo-edrw.png" alt="Logo EDRW" class="mx-auto w-32 mb-6">
            <h1 class="text-4xl font-black text-white tracking-tighter uppercase">GUIDE COMPÉTITIF</h1>
            <p class="text-xs text-slate-400 mt-2">Version 1.0.3</p>
            <p class="text-slate-400 mt-2">Votre compagnon pour vous accompagner lors des compétitions EDRW</p>
            <p class="text-slate-400 mt-2">Sélectionnez une compétition pour débuter</p>
        </header>

        <div class="space-y-4">
            <a href="onstage/index.html"
                class="group block p-6 bg-slate-900 border border-slate-800 rounded-2xl hover:border-blue-500 hover:bg-slate-800/50 transition-all shadow-xl">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-bold text-white group-hover:text-blue-400">OnStage</h2>
                        <p class="text-sm text-slate-500 tracking-wide uppercase font-semibold">9 au 12 avril
                            2026<br>Algonquin Common Theatre, Ottawa</p>
                    </div>
                    <span class="text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity">→</span>
                </div>
            </a>


        </div>
    </div>
<div id="install-banner" class="hidden fixed bottom-4 left-4 right-4 bg-blue-600 text-white p-4 rounded-2xl shadow-2xl flex items-center justify-between z-50">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 p-2 rounded-lg text-xl">📲</div>
            <div>
                <p class="font-bold text-sm">Installer l'application</p>
                <p class="text-xs text-blue-100">Accès rapide sur l'écran d'accueil</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="dismissInstall()" class="px-3 py-1 text-xs font-bold border border-white/30 rounded-lg">Plus tard</button>
            <button id="install-button" class="px-4 py-1 text-xs font-bold bg-white text-blue-600 rounded-lg">Ajouter</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
        let deferredPrompt;
        const banner = document.getElementById('install-banner');
        const installBtn = document.getElementById('install-button');

        // Détection pour Android
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); // Empêche Chrome d'afficher sa bannière moche
            deferredPrompt = e;
            // On affiche notre bannière personnalisée si l'utilisateur ne l'a pas déjà refusée
            if(!localStorage.getItem('install-dismissed')) {
                banner.classList.remove('hidden');
            }
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('App installée !');
                }
                deferredPrompt = null;
                banner.classList.add('hidden');
            }
        });

        // Détection spécifique pour iOS (Safari)
        const isIos = () => {
            const userAgent = window.navigator.userAgent.toLowerCase();
            return /iphone|ipad|ipod/.test(userAgent);
        };
        
        const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);

        if (isIos() && !isInStandaloneMode() && !localStorage.getItem('install-dismissed')) {
            // Pour iOS, on change le texte car on ne peut pas déclencher l'install
            document.querySelector('#install-banner p.text-xs').innerText = "Appuyez sur 'Partager' puis 'Sur l'écran d'accueil'";
            document.getElementById('install-button').classList.add('hidden'); // On cache le bouton "Ajouter" inutile
            banner.classList.remove('hidden');
        }

        function dismissInstall() {
            banner.classList.add('hidden');
            localStorage.setItem('install-dismissed', 'true');
        }
    </script>
</body>

</html>
