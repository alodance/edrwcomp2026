<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDRW Photo Rally</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        .completed {
            @apply opacity-60 bg-emerald-900/20 border-emerald-500/50 scale-[0.98];
            transition: all 0.3s ease;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, .1);
            border-top: 3px solid #60a5fa;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        input::file-selector-button { display: none; }
    </style>
    <script src="/inspire/inspire-core.js"></script>
</head>

<body class="bg-[#0f172a] text-slate-200 p-4 md:p-8 font-sans">
    <div id="next-chore-bar" class="hidden fixed bottom-0 left-0 right-0 bg-blue-600 border-t border-blue-400 shadow-[0_-15px_30px_rgba(0,0,0,0.5)] z-[100] px-4 pt-3 pb-[calc(12px+env(safe-area-inset-bottom))] animate-in fade-in slide-in-from-bottom-full duration-500">
    <div class="max-w-md mx-auto flex items-center justify-between gap-3">
        <div class="flex items-center gap-3 min-w-0"> <div class="bg-white/20 p-2 rounded-lg shrink-0">
                <span class="text-xl">💃</span>
            </div>
            <div class="min-w-0">
                <p class="text-[10px] font-black uppercase tracking-tighter text-blue-100 leading-none mb-1">
                    Prochain passage à <span id="next-time" class="text-white">--:--</span>
                </p>
                <h4 id="next-title" class="text-sm font-bold text-white truncate leading-tight">
                    Chargement...
                </h4>
            </div>
        </div>
        <div class="shrink-0">
            <span id="next-countdown" class="bg-black/20 px-3 py-1.5 rounded-full text-[10px] font-black text-white whitespace-nowrap border border-white/10">
                -- MIN
            </span>
        </div>
    </div>
</div>

    <div class="max-w-3xl mx-auto bg-slate-900/50 rounded-2xl shadow-2xl border border-slate-800 p-6">
        <a href="/inspire/index.html">
            <p class="border text-center border-blue-500 m-2 p-3 text-blue-500 hover:text-blue-400 cursor-pointer">Retour</p>
        </a>
        
        <header class="text-center mb-10 border-b border-slate-800 pb-6">
            <h1 class="text-3xl font-black tracking-tight text-white uppercase">Rallye photos</h1>
            <p class="text-slate-400 mt-2 text-sm italic">Photo Rally</p>
        </header>

        <div class="flex justify-center w-full px-6 mb-8">
            <button onclick="openModal()" class="w-full max-w-xs py-3 px-6 bg-slate-900 border border-slate-700 rounded-xl text-slate-400 font-bold text-xs tracking-[0.2em] uppercase hover:border-blue-500 hover:text-white transition-all shadow-lg active:scale-95">
                Règlements / Rules
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10" id="user-info-section">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Nom / Name</label>
                <input type="text" id="userName" class="w-full bg-slate-800 border border-slate-700 text-white p-3 rounded-lg outline-none placeholder:text-slate-600" placeholder="Nom complet / Full Name">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Courriel / Email</label>
                <input type="email" id="userEmail" class="w-full bg-slate-800 border border-slate-700 text-white p-3 rounded-lg outline-none placeholder:text-slate-600" placeholder="email@exemple.com">
            </div>
        </div>

        <div id="questions-container" class="space-y-4"></div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz2jEyPAT-Cip5hYR5vpOvPP-bQgLgXJGst9VCdgalSkygSb0y38FGQVv9dm2qMD8SRQQ/exec';

        const questions = [
            { fr: "Une photo de moi avec un parent EDRW qui n'est pas le mien.", en: "A photo of me with an EDRW parent who is not my own." },
            { fr: "Une photo de moi avec DEUX danseurs qui dansent dans DEUX studios différents qui n'est pas EDRW.", en: "A photo of me with TWO dancers dancing in TWO different studios that are not EDRW." },
            { fr: "Une photo qui montre que je suis à/dans/sur deux endroits différents en même temps.", en: "A photo showing that I am in/at/on two different places at the same time." },
            { fr: "Une photo de la salle vue de la scène.", en: "A photo of the hall viewed from the stage." },
            { fr: "Une photo de moi, avec un danseur d'un autre studio, qui porte un costume vert.", en: "A photo of me with a dancer from another studio wearing a green costume." },
            { fr: "Une photo de moi devant la scène vide (pendant une pause).", en: "A photo of me in front of the empty stage (during a break)." },
            { fr: "Une photo représentant un danseur de compétition au repos.", en: "A photo depicting a competition dancer at rest." },
            { fr: "Une photo où on peut voir le nom de la compétition, l'année et mon nom.", en: "A photo where the name of the competition, the year, and my name can be seen." },
            { fr: "Une photo de moi avec un employé de la compétition.", en: "A photo of me with a competition employee." },
            { fr: "Une photo de moi en compagnie d'un juge de la compétition.", en: "A photo of me in the company of a competition judge." },
            { fr: "Un selfie de moi sur la scène.", en: "A selfie of me on the stage." },
            { fr: "Une photo drôle de moi dans/sur/avec une valise.", en: "A funny photo of me in/on/with a suitcase." },
            { fr: "Un selfie avec DEUX danseurs EDRW qui ne dansent pas dans mon groupe.", en: "A selfie with TWO EDRW dancers who do not dance in my group." },
            { fr: "Une photo de moi qui fait une bonne action.", en: "A photo of me doing a good deed." },
            { fr: "Un selfie de moi avec l'animateur de la compétition.", en: "A selfie of me with the competition host." }
        ];

        const container = document.getElementById('questions-container');
        const userNameInput = document.getElementById('userName');
        const userEmailInput = document.getElementById('userEmail');

        function init() {
            userNameInput.value = localStorage.getItem('edrw_name') || '';
            userEmailInput.value = localStorage.getItem('edrw_email') || '';

            questions.forEach((q, index) => {
                const isDone = localStorage.getItem(`q_${index}_done`);
                const div = document.createElement('div');
                div.id = `card-${index}`;
                div.className = `p-5 border rounded-xl transition-all duration-300 ${isDone ? 'completed' : 'bg-slate-800/40 border-slate-700'}`;

                div.innerHTML = `
                <div class="flex flex-col gap-4">
                    <div class="flex-1">
                        <p class="font-bold text-blue-400 leading-tight">${index + 1}. ${q.fr}</p>
                        <p class="text-xs text-slate-500 italic mt-1 uppercase tracking-wide">${q.en}</p>
                    </div>
                    
                    <div id="status-${index}" class="hidden flex justify-center py-2"><div class="spinner"></div></div>
                    
                    <div id="actions-${index}" class="flex flex-wrap gap-2 ${isDone ? 'hidden' : ''}">
                        <input type="file" id="cam-${index}" accept="image/*" capture="environment" class="hidden" onchange="handleUpload(${index}, 'cam-${index}')">
                        <button onclick="document.getElementById('cam-${index}').click()" class="flex-1 min-w-[140px] bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-lg font-bold text-[10px] uppercase tracking-wider shadow-lg">
                            📸 Prendre photo
                        </button>
                        
                        <input type="file" id="gal-${index}" accept="image/*" class="hidden" onchange="handleUpload(${index}, 'gal-${index}')">
                        <button onclick="document.getElementById('gal-${index}').click()" class="flex-1 min-w-[140px] bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-lg font-bold text-[10px] uppercase tracking-wider shadow-lg">
                            📁 Choisir photo
                        </button>
                    </div>

                    ${isDone ? `<div class="text-center py-2 text-emerald-400 font-bold text-sm tracking-widest uppercase">COMPLÉTÉ ✓</div>` : ''}
                </div>
            `;
                container.appendChild(div);
            });
        }

        async function handleUpload(index, inputId) {
            const fileInput = document.getElementById(inputId);
            const name = userNameInput.value.trim();
            const email = userEmailInput.value.trim();

            if (!name || !email) {
                alert("Veuillez entrer votre nom et courriel avant de continuer.");
                fileInput.value = '';
                return;
            }

            localStorage.setItem('edrw_name', name);
            localStorage.setItem('edrw_email', email);

            const file = fileInput.files[0];
            if (!file) return;

            const actionsDiv = document.getElementById(`actions-${index}`);
            const statusDiv = document.getElementById(`status-${index}`);
            
            actionsDiv.classList.add('hidden');
            statusDiv.classList.remove('hidden');

            const reader = new FileReader();
            reader.onload = async function (e) {
                const base64File = e.target.result;
                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({
                            userName: name,
                            userEmail: email,
                            fileName: `Q${index + 1}_${name.replace(/\s+/g, '_')}_${Date.now()}.jpg`,
                            file: base64File
                        })
                    });
                    markAsDone(index);
                } catch (error) {
                    console.error(error);
                    alert("Erreur lors du téléversement. Réessayez.");
                    actionsDiv.classList.remove('hidden');
                } finally {
                    statusDiv.classList.add('hidden');
                }
            };
            reader.readAsDataURL(file);
        }

        function markAsDone(index) {
            localStorage.setItem(`q_${index}_done`, "true");
            const card = document.getElementById(`card-${index}`);
            card.innerHTML = `
                <div class="flex flex-col gap-4">
                    <div class="flex-1">
                        <p class="font-bold text-blue-400 leading-tight">${index + 1}. ${questions[index].fr}</p>
                        <p class="text-xs text-slate-500 italic mt-1 uppercase tracking-wide">${questions[index].en}</p>
                    </div>
                    <div class="text-center py-2 text-emerald-400 font-bold text-sm tracking-widest uppercase">COMPLÉTÉ ✓</div>
                </div>
            `;
            card.classList.add('completed');
        }

        init();
        
        // --- Fonctions Modal (identiques) ---
        function openModal() { document.getElementById('rules-modal').classList.remove('hidden'); document.body.style.overflow = 'hidden'; }
        function closeModal() { document.getElementById('rules-modal').classList.add('hidden'); document.body.style.overflow = 'auto'; }
    </script>

    </body>
</html>
